  <script>
  const frame=document.getElementById('gameFrame');
  const errorBox=document.getElementById('patchError');

  function showPatchError(message){
    errorBox.textContent='공게임 실행 오류: '+message;
    errorBox.style.display='block';
  }

  let sourceReady=false;
  let loadFinished=false;

  const GONG_BUILD='V97';
  const OUTER_STATE_DB='gong-v97-live-state-db';
  const OUTER_STATE_STORE='live-state';
  const OUTER_STATE_KEY='current';
  const OUTER_LOCAL_KEY='gong-v97-live-state-v1';
  const LEGACY_LOCAL_KEYS=[];
  let outerLatestLiveState='';
  let outerWriteTimer=null;
  let outerWriteChain=Promise.resolve();

  function openOuterStateDb(){
    return new Promise((resolve,reject)=>{
      if(!('indexedDB' in window)){reject(new Error('IndexedDB 미지원'));return}
      const request=indexedDB.open(OUTER_STATE_DB,1);
      request.onupgradeneeded=()=>{
        const db=request.result;
        if(!db.objectStoreNames.contains(OUTER_STATE_STORE))db.createObjectStore(OUTER_STATE_STORE);
      };
      request.onsuccess=()=>resolve(request.result);
      request.onerror=()=>reject(request.error||new Error('IndexedDB 열기 실패'));
      request.onblocked=()=>reject(new Error('IndexedDB가 다른 탭에 의해 차단됨'));
    });
  }

  async function readOuterStateFromDb(){
    const db=await openOuterStateDb();
    try{
      return await new Promise((resolve,reject)=>{
        const tx=db.transaction(OUTER_STATE_STORE,'readonly');
        const request=tx.objectStore(OUTER_STATE_STORE).get(OUTER_STATE_KEY);
        request.onsuccess=()=>resolve(typeof request.result==='string'?request.result:'');
        request.onerror=()=>reject(request.error||new Error('저장 데이터 읽기 실패'));
      });
    }finally{db.close()}
  }

  async function writeOuterStateToDb(encoded){
    if(typeof encoded!=='string'||!encoded)return;
    const db=await openOuterStateDb();
    try{
      await new Promise((resolve,reject)=>{
        const tx=db.transaction(OUTER_STATE_STORE,'readwrite');
        tx.objectStore(OUTER_STATE_STORE).put(encoded,OUTER_STATE_KEY);
        tx.oncomplete=()=>resolve();
        tx.onerror=()=>reject(tx.error||new Error('저장 데이터 쓰기 실패'));
        tx.onabort=()=>reject(tx.error||new Error('저장 데이터 쓰기 중단'));
      });
    }finally{db.close()}
  }

  async function clearOuterStateDb(){
    const db=await openOuterStateDb();
    try{
      await new Promise((resolve,reject)=>{
        const tx=db.transaction(OUTER_STATE_STORE,'readwrite');
        tx.objectStore(OUTER_STATE_STORE).delete(OUTER_STATE_KEY);
        tx.oncomplete=()=>resolve();
        tx.onerror=()=>reject(tx.error||new Error('저장 데이터 삭제 실패'));
        tx.onabort=()=>reject(tx.error||new Error('저장 데이터 삭제 중단'));
      });
    }finally{db.close()}
  }

  function readOuterLocalFallback(){
    try{
      const current=localStorage.getItem(OUTER_LOCAL_KEY);
      if(current)return current;
      for(const key of LEGACY_LOCAL_KEYS){
        const legacy=localStorage.getItem(key);
        if(legacy)return legacy;
      }
    }catch(error){}
    return '';
  }

  function writeOuterLocalFallback(encoded){
    try{
      // localStorage는 용량이 작으므로 충분히 작을 때만 보조 저장으로 사용한다.
      if(encoded.length<3800000)localStorage.setItem(OUTER_LOCAL_KEY,encoded);
    }catch(error){}
  }

  async function loadOuterLiveState(){
    let saved='';
    try{saved=await readOuterStateFromDb()}catch(error){
      console.warn('[공게임 V97] IndexedDB 읽기 실패, 보조 저장소 사용',error);
    }
    if(!saved)saved=readOuterLocalFallback();
    outerLatestLiveState=saved||'';
    return outerLatestLiveState;
  }

  function persistOuterLiveState(encoded){
    if(typeof encoded!=='string'||!encoded)return Promise.resolve(false);
    outerLatestLiveState=encoded;
    writeOuterLocalFallback(encoded);
    outerWriteChain=outerWriteChain
      .catch(()=>{})
      .then(()=>writeOuterStateToDb(outerLatestLiveState))
      .then(()=>true)
      .catch(error=>{
        console.warn('[공게임 V97] 진행 저장 실패',error);
        return false;
      });
    return outerWriteChain;
  }

  function queueOuterLiveState(encoded,immediate=false){
    if(typeof encoded!=='string'||!encoded)return false;
    outerLatestLiveState=encoded;
    if(outerWriteTimer){clearTimeout(outerWriteTimer);outerWriteTimer=null}
    if(immediate){persistOuterLiveState(outerLatestLiveState);return true}
    outerWriteTimer=setTimeout(()=>{
      outerWriteTimer=null;
      persistOuterLiveState(outerLatestLiveState);
    },100);
    return true;
  }

  window.__GONG_V97_SAVE_STATE__=(encoded,immediate=false)=>queueOuterLiveState(encoded,Boolean(immediate));
  window.__GONG_V97_LOAD_STATE__=()=>outerLatestLiveState;
  window.__GONG_V97_CLEAR_STATE__=()=>{
    outerLatestLiveState='';
    try{localStorage.removeItem(OUTER_LOCAL_KEY)}catch(error){}
    for(const key of LEGACY_LOCAL_KEYS){try{localStorage.removeItem(key)}catch(error){}}
    clearOuterStateDb().catch(()=>{});
    return true;
  };
  const outerStateReady=loadOuterLiveState();

  function requestImmediateInnerSave(){
    try{frame.contentWindow?.__GONG_V97_FORCE_SAVE__?.(true)}catch(error){}
    if(outerLatestLiveState)queueOuterLiveState(outerLatestLiveState,true);
  }

  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='hidden')requestImmediateInnerSave();
  });
  window.addEventListener('pagehide',requestImmediateInnerSave);
  window.addEventListener('beforeunload',requestImmediateInnerSave);
  window.addEventListener('blur',requestImmediateInnerSave);
  document.addEventListener('freeze',requestImmediateInnerSave);

  async function fetchWithTimeout(url,timeoutMs=90000){
    const controller=new AbortController();
    const timer=setTimeout(()=>controller.abort(),timeoutMs);
    try{
      const response=await fetch(url,{cache:'no-store',mode:'cors',signal:controller.signal});
      if(!response.ok)throw new Error(`HTTP ${response.status}`);
      const html=await response.text();
      if(!html.includes('V89_DAWON_CONSTELLATION_COOLDOWN')&&!html.includes('수원외고 공게임')){
        throw new Error('공게임 원본이 아닌 응답을 받았습니다.');
      }
      return html;
    }finally{
      clearTimeout(timer);
    }
  }

  function addBaseUrl(html){
    if(/<base\s/i.test(html))return html;
    return html.replace(/<head([^>]*)>/i,'<head$1><base href="https://ddogy1212.github.io/gong/">');
  }

  async function loadOnlineGame(){
    const sources=[
      `https://cdn.jsdelivr.net/gh/ddogy1212/gong@452233baa11b5d3d28ce4e5f5d862362f5ab65f4/index.html`,
      `https://raw.githubusercontent.com/ddogy1212/gong/452233baa11b5d3d28ce4e5f5d862362f5ab65f4/index.html`
    ];
    const errors=[];
    for(let i=0;i<sources.length;i++){
      try{
        let html=await fetchWithTimeout(sources[i]);
        html=addBaseUrl(html);
        sourceReady=true;
        frame.srcdoc=html;
        return;
      }catch(error){
        errors.push(`${i+1}: ${error?.message||error}`);
      }
    }
    throw new Error('공게임 원본을 내려받지 못했습니다. 인터넷 연결을 확인한 뒤 다시 열어주세요. ('+errors.join(' / ')+')');
  }

  frame.addEventListener('load',async()=>{
    if(!sourceReady||loadFinished)return;
    try{
      await outerStateReady;
      const doc=frame.contentDocument;
      if(!doc||!doc.body)throw new Error('기존 게임 문서를 불러오지 못했습니다.');
      try{frame.contentWindow.__GONG_V97_BOOT_STATE__=outerLatestLiveState}catch(error){}

      const style=doc.createElement('style');
      style.textContent=`
        .setup-actions{

          gap:9px!important;

        .showdown-bulk-actions>button{width:100%!important;min-height:48px!important}

          width:100%!important;
          min-height:52px!important;

          padding:9px 8px!important;
          border-radius:12px!important;

        }

        .gong-auto-btn.running{background:#f2f2f3!important;border-color:#a9aaae!important;color:#555!important;box-shadow:0 3px 0 #85868a!important}
        .gong-auto-stop{background:#b01832!important;color:#fff!important}
        .controls.gong-auto-running{grid-template-columns:repeat(2,minmax(0,1fr))}
        .gong-auto-countdown{

        }

        .gong-contact-btn{

        .gong-account-slot{margin-top:9px}

        }

        .gong-contact-card{

          border-radius:18px;padding:16px;box-shadow:0 12px 40px #0006
        }
        .gong-contact-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
        .gong-contact-title{font-size:21px;font-weight:1000;letter-spacing:-.6px}
        .gong-contact-close{border:0;border-radius:9px;background:#eee;padding:7px 10px;font-weight:1000;cursor:pointer}
        .gong-contact-form{display:grid;gap:10px}
        .gong-contact-field{display:grid;gap:5px}
        .gong-contact-field label{font-size:12px;font-weight:1000;color:#333}
        .gong-contact-field input,.gong-contact-field select,.gong-contact-field textarea{
          width:100%;border:2px solid #cfcfd4;border-radius:10px;background:#fff;padding:10px;
          font:inherit;color:#111;outline:none
        }
        .gong-contact-field input:focus,.gong-contact-field select:focus,.gong-contact-field textarea:focus{border-color:#111}
        .gong-contact-field textarea{min-height:150px;resize:vertical;line-height:1.5}
        .gong-contact-hint{padding:9px 10px;border-radius:10px;background:#f3f4f7;color:#555;font-size:11px;font-weight:800;line-height:1.5}
        .gong-contact-submit{border:0;border-radius:12px;background:#111;color:#fff;padding:13px;font-weight:1000;cursor:pointer}
        .gong-contact-note{font-size:10px;color:#777;line-height:1.45;text-align:center}
        @media(max-width:470px){.gong-contact-card{padding:13px}}
      `;
      doc.head.appendChild(style);

      const patch=doc.createElement('script');
      patch.textContent=`(()=>{
        'use strict';

        const CONTACT_EMAIL='ddogy503@gmail.com';
        let autoBattleRunning=false;
        let autoAdvanceTimer=null;
        let autoCountdownTimer=null;
        let resultRoundToken=0;
        let internalBackMove=false;
        let autoCountdownRemaining=0;
        let restoringLiveState=false;
        let liveSaveTimer=null;
        const LIVE_STATE_KEY='gong-v97-live-state-v3';

        function encodeLiveGraph(root){
          const seen=new Map();
          const nodes=[];
          const skipped=new Set(['imageObj','partnerImageObj','im','img','partnerImg']);
          const visualArrays=new Set(['particles','floaters','attackFx']);

          function encode(value,key=''){
            if(value===undefined)return {g:'u'};
            if(typeof value==='number'&&!Number.isFinite(value))return {g:'n',v:String(value)};
            if(typeof value==='bigint')return {g:'b',v:String(value)};
            if(typeof value==='function')return {g:'u'};
            if(value===null||typeof value!=='object')return value;
            if(typeof HTMLImageElement!=='undefined'&&value instanceof HTMLImageElement)return {g:'i'};
            if(typeof Node!=='undefined'&&value instanceof Node)return {g:'d'};
            if(seen.has(value))return {g:'r',v:seen.get(value)};

            const index=nodes.length;
            seen.set(value,index);
            let kind='o';
            if(Array.isArray(value))kind='a';
            else if(value instanceof Date)kind='t';
            else if(value instanceof Map)kind='m';
            else if(value instanceof Set)kind='s';
            const node={k:kind,v:null};
            nodes.push(node);

            if(kind==='a'){
              node.v=value.map((item,i)=>encode(item,String(i)));
            }else if(kind==='t'){
              node.v=value.toISOString();
            }else if(kind==='m'){
              node.v=[...value.entries()].map(entry=>[encode(entry[0]),encode(entry[1])]);
            }else if(kind==='s'){
              node.v=[...value.values()].map(item=>encode(item));
            }else{
              const out={};
              for(const prop of Object.keys(value)){
                if(skipped.has(prop))continue;
                if(visualArrays.has(prop)){out[prop]=[];continue}
                try{out[prop]=encode(value[prop],prop)}catch(error){}
              }
              node.v=out;
            }
            return {g:'r',v:index};
          }

          return JSON.stringify({version:2,root:encode(root),nodes});
        }

        function decodeLiveGraph(text){
          const packed=JSON.parse(text);
          if(!packed||packed.version!==2||!Array.isArray(packed.nodes))throw new Error('저장 형식이 맞지 않습니다.');
          const made=packed.nodes.map(node=>{
            if(node.k==='a')return [];
            if(node.k==='m')return new Map();
            if(node.k==='s')return new Set();
            if(node.k==='t')return new Date(node.v);
            return {};
          });

          function decode(token){
            if(token===null||typeof token!=='object'||!Object.prototype.hasOwnProperty.call(token,'g'))return token;
            if(token.g==='r')return made[token.v];
            if(token.g==='u'||token.g==='i'||token.g==='d')return undefined;
            if(token.g==='b')return BigInt(token.v);
            if(token.g==='n'){
              if(token.v==='NaN')return NaN;
              if(token.v==='Infinity')return Infinity;
              if(token.v==='-Infinity')return -Infinity;
            }
            return undefined;
          }

          packed.nodes.forEach((node,index)=>{
            const target=made[index];
            if(node.k==='a'){
              node.v.forEach(item=>target.push(decode(item)));
            }else if(node.k==='m'){
              node.v.forEach(entry=>target.set(decode(entry[0]),decode(entry[1])));
            }else if(node.k==='s'){
              node.v.forEach(item=>target.add(decode(item)));
            }else if(node.k==='o'){
              for(const [key,value] of Object.entries(node.v||{}))target[key]=decode(value);
            }
          });
          return decode(packed.root);
        }

        function repairRestoredGame(){
          if(!game||!Array.isArray(game.players))return;
          for(const player of game.players){
            const def=DEFS[player.id];
            if(!def)continue;
            player.img=def.img;
            if(def.partnerImg)player.partnerImg=def.partnerImg;
            const image=new Image();
            image.src=def.img;
            player.imageObj=image;
            player.im=image;
            const partnerImage=new Image();
            if(def.partnerImg)partnerImage.src=def.partnerImg;
            player.partnerImageObj=partnerImage;
          }
          if(!Array.isArray(game.particles))game.particles=[];
          if(!Array.isArray(game.floaters))game.floaters=[];
          if(!Array.isArray(game.attackFx))game.attackFx=[];
        }

        function makeLiveSnapshot(){
          const inBattle=isBattleScreenActive();
          return {
            version:2,
            build:'V98',
            savedAt:Date.now(),
            screen:inBattle?'battle':'setup',
            mode,
            assignments,
            activeZone,
            selectedBoss,
            currentConfig,
            paused,
            timeScale,
            battleGeneration,
            game:inBattle?game:null,
            resultOpen:Boolean(resultModal&&!resultModal.classList.contains('hidden')),
            autoBattleRunning,
            autoCountdownRemaining,
            killfeedHtml:killfeed?.innerHTML||'',
            logHtml:logText?.innerHTML||''
          };
        }

        function saveLiveState(immediate=false){
          if(restoringLiveState)return false;
          try{
            const encoded=encodeLiveGraph(makeLiveSnapshot());
            let bridged=false;
            try{
              if(window.parent&&window.parent!==window&&typeof window.parent.__GONG_V97_SAVE_STATE__==='function'){
                bridged=window.parent.__GONG_V97_SAVE_STATE__(encoded,Boolean(immediate))!==false;
              }
            }catch(error){}
            if(!bridged){
              try{localStorage.setItem(LIVE_STATE_KEY,encoded);bridged=true}catch(error){}
            }
            return bridged;
          }catch(error){
            console.warn('[공게임 V97 저장 실패]',error);
            return false;
          }
        }

        function restoreLiveState(){
          let raw='';
          try{raw=String(window.__GONG_V97_BOOT_STATE__||'')}catch(error){}
          if(!raw){
            try{
              if(window.parent&&window.parent!==window&&typeof window.parent.__GONG_V97_LOAD_STATE__==='function'){
                raw=String(window.parent.__GONG_V97_LOAD_STATE__()||'');
              }
            }catch(error){}
          }
          if(!raw){
            try{raw=localStorage.getItem(LIVE_STATE_KEY)||localStorage.getItem('gong-v90-live-state-v2')||''}catch(error){}
          }
          if(!raw)return false;
          restoringLiveState=true;
          try{
            const state=decodeLiveGraph(raw);
            if(!state||state.version!==2)return false;

            if(state.mode)mode=state.mode;
            if(state.assignments)assignments=state.assignments;
            if(state.activeZone)activeZone=state.activeZone;
            if(state.selectedBoss&&state.selectedBoss!=='naeonseong')selectedBoss=state.selectedBoss;
            currentConfig=state.currentConfig||null;
            paused=Boolean(state.paused);
            timeScale=Number(state.timeScale)||1;
            battleGeneration=Number(state.battleGeneration)||0;
            autoBattleRunning=Boolean(state.autoBattleRunning);
            autoCountdownRemaining=Math.max(0,Number(state.autoCountdownRemaining)||0);

            document.querySelectorAll('.mode-btn').forEach(button=>{
              button.classList.toggle('active',button.dataset.mode===mode);
            });
            teamOptions.classList.toggle('hidden',mode!=='team');
            bossSelectWrap.classList.toggle('show',mode==='boss');
            document.body.classList.toggle('boss-setup',mode==='boss'&&state.screen!=='battle');
            try{renderBossInfo(selectedBoss)}catch(error){}

            if(state.screen==='battle'&&state.game&&currentConfig){
              game=state.game;
              repairRestoredGame();
              setup.classList.add('hidden');
              battle.classList.remove('hidden');
              document.body.classList.toggle('boss-battle',currentConfig.mode==='boss');
              document.body.classList.remove('boss-setup');
              resize();
              last=0;
              document.getElementById('pause').textContent=paused?'계속하기':'일시정지';
              if(state.killfeedHtml)killfeed.innerHTML=state.killfeedHtml;
              if(state.logHtml)logText.innerHTML=state.logHtml;
              try{updateUI()}catch(error){}
              if(game.over)openResultsBtn.classList.remove('hidden');
              else openResultsBtn.classList.add('hidden');
              if(state.resultOpen&&game.over){
                try{openResultModal()}catch(error){}
              }else{
                try{closeResultModal()}catch(error){}
              }
              syncAutoButtons();
              window.scrollTo({top:0,behavior:'auto'});
            }else{
              game=null;
              battle.classList.add('hidden');
              setup.classList.remove('hidden');
              document.body.classList.remove('boss-battle');
              renderSetup();
              syncAutoButtons();
            }
            console.info('[공게임] 저장된 진행 상황을 복구했습니다.');
            return true;
          }catch(error){
            console.warn('[공게임 복구 실패]',error);
            try{localStorage.removeItem(LIVE_STATE_KEY)}catch(removeError){}
            try{window.__GONG_V97_BOOT_STATE__=''}catch(clearError){}
            try{window.parent?.__GONG_V97_CLEAR_STATE__?.()}catch(clearParentError){}
            return false;
          }finally{
            restoringLiveState=false;
          }
        }

        function installLivePersistence(){
          if(liveSaveTimer)clearInterval(liveSaveTimer);
          // 안드로이드가 탭을 갑자기 정지해도 최근 장면이 남도록 자주 저장한다.
          liveSaveTimer=setInterval(()=>saveLiveState(false),700);
          document.addEventListener('visibilitychange',()=>{
            if(document.visibilityState==='hidden')saveLiveState(true);
          });
          window.addEventListener('pagehide',()=>saveLiveState(true));
          window.addEventListener('beforeunload',()=>saveLiveState(true));
          window.addEventListener('blur',()=>saveLiveState(true));
          document.addEventListener('freeze',()=>saveLiveState(true));
          window.__GONG_V97_FORCE_SAVE__=(immediate=true)=>saveLiveState(Boolean(immediate));
          window.setTimeout(()=>saveLiveState(true),150);
        }

        function removeNaeonseongRuntime(){
          try{delete DEFS.naeonseong}catch(error){}
          try{delete BOSS_INFO.naeonseong}catch(error){}
          try{delete SKILL_INFO.naeonseong}catch(error){}
          try{delete assignments.naeonseong}catch(error){}
          try{BOSS_IDS.delete('naeonseong')}catch(error){}
          try{if(selectedBoss==='naeonseong')selectedBoss='james'}catch(error){}

          document.querySelectorAll('[data-boss="naeonseong"],#bossNaImg').forEach(el=>{
            const card=el.closest?.('.boss-card');
            (card||el).remove();
          });
          document.querySelectorAll('.boss-card').forEach(card=>{
            card.classList.toggle('active',card.dataset.boss==='james');
          });
          try{renderBossInfo('james')}catch(error){}
        }

        function ensureAutoCountdown(){
          let countdown=document.getElementById('gongAutoCountdown');
          if(countdown&&countdown.isConnected)return countdown;
          countdown=document.createElement('div');
          countdown.id='gongAutoCountdown';
          countdown.className='gong-auto-countdown hidden';
          countdown.setAttribute('aria-live','polite');
          const winner=resultBody?.querySelector?.('.result-winner');
          if(winner)winner.insertAdjacentElement('afterend',countdown);
          else resultBody?.prepend?.(countdown);
          return countdown;
        }

        function randomize(values){
          const out=[...values];
          for(let i=out.length-1;i>0;i--){
            const j=Math.floor(Math.random()*(i+1));
            [out[i],out[j]]=[out[j],out[i]];
          }
          return out;
        }

        function isBattleScreenActive(){
          const battleScreen=document.getElementById('battle');
          return Boolean(battleScreen&&!battleScreen.classList.contains('hidden'));
        }

        function syncAutoButtons(){
          const setupButton=document.getElementById('gongAutoBattle');
          const stopButton=document.getElementById('gongAutoBattleStop');
          const inActiveBattle=autoBattleRunning&&isBattleScreenActive()&&resultModal?.classList.contains('hidden');
          if(setupButton){
            setupButton.textContent=autoBattleRunning?'⏳ 자동 배틀 진행 중':'🤖 자동 배틀';
            setupButton.classList.toggle('running',autoBattleRunning);
            setupButton.disabled=autoBattleRunning;
          }
          if(stopButton)stopButton.classList.toggle('hidden',!inActiveBattle);
          stopButton?.closest('.controls')?.classList.toggle('gong-auto-running',inActiveBattle);
        }

        function clearAutoTimers(){
          if(autoAdvanceTimer){clearTimeout(autoAdvanceTimer);autoAdvanceTimer=null}
          if(autoCountdownTimer){clearInterval(autoCountdownTimer);autoCountdownTimer=null}
        }

        function stopAutoBattle(){
          autoBattleRunning=false;
          autoCountdownRemaining=0;
          resultRoundToken+=1;
          clearAutoTimers();
          document.getElementById('gongAutoCountdown')?.classList.add('hidden');
          syncAutoButtons();
          try{if(game&&!game.over)log('<b>자동 배틀을 그만했습니다.</b> 현재 경기는 계속됩니다.')}catch(error){}
          saveLiveState();
        }

        function activateShowdownThroughUI(){
          const showdownMode=document.querySelector('.mode-btn[data-mode="showdown"]');
          if(!showdownMode)throw new Error('쇼다운 모드 버튼을 찾지 못했습니다.');
          if(!showdownMode.classList.contains('active'))showdownMode.click();

          const zone=document.querySelector('[data-zone="showdown"]');
          if(zone)zone.click();

          const removeAll=document.getElementById('removeAllShowdown');
          if(removeAll&&!removeAll.classList.contains('hidden'))removeAll.click();
        }

        function chooseRandomCharactersThroughUI(){
          activateShowdownThroughUI();
          const allIds=[...document.querySelectorAll('#poolCards .char-card[data-char]')]
            .map(card=>card.dataset.char)
            .filter(id=>id&&id!=='naeonseong');
          if(allIds.length<2)throw new Error('선택 가능한 캐릭터가 부족합니다.');

          const count=Math.min(allIds.length,2+Math.floor(Math.random()*5));
          const picked=randomize(allIds).slice(0,count);

          for(const id of picked){
            const card=document.querySelector('#poolCards .char-card[data-char="'+CSS.escape(id)+'"]');
            if(!card)throw new Error((DEFS?.[id]?.name||id)+' 카드를 찾지 못했습니다.');
            card.click();
          }
          return picked;
        }

        function startNextAutoBattle(){
          if(!autoBattleRunning)return;
          try{
            if(isBattleScreenActive()){
              internalBackMove=true;
              document.getElementById('back')?.click();
              internalBackMove=false;
            }
            const picked=chooseRandomCharactersThroughUI();
            const startButton=document.getElementById('start');
            if(!startButton)throw new Error('전투 시작 버튼을 찾지 못했습니다.');
            startButton.click();
            if(!isBattleScreenActive())throw new Error('전투 화면으로 전환되지 않았습니다.');
            syncAutoButtons();
            window.setTimeout(saveLiveState,80);
            console.info('[자동 배틀] '+picked.length+'명 시작:',picked);
          }catch(error){
            console.error('[자동 배틀 오류]',error);
            autoBattleRunning=false;
            clearAutoTimers();
            syncAutoButtons();
            alert('자동 배틀을 시작하지 못했습니다. '+(error?.message||error));
          }
        }

        function beginAutoBattle(event){
          event?.preventDefault?.();
          event?.stopPropagation?.();
          if(autoBattleRunning)return;
          autoBattleRunning=true;
          syncAutoButtons();
          window.setTimeout(startNextAutoBattle,0);
        }

        function installAutoBattleUI(){
          const setupActions=document.querySelector('.setup-actions');
          const skillButton=document.getElementById('openSkillsSetup');
          if(!setupActions)throw new Error('상단 버튼 영역을 찾지 못했습니다.');

          let button=document.getElementById('gongAutoBattle');
          if(!button){
            button=document.createElement('button');
            button.id='gongAutoBattle';
            button.type='button';
            button.className='gong-auto-btn';
            button.textContent='🤖 자동 배틀';
            setupActions.appendChild(button);
          }

          button.onclick=beginAutoBattle;
          button.onpointerup=event=>{
            if(event.pointerType==='touch')beginAutoBattle(event);
          };

          const controls=document.querySelector('.controls');
          if(controls&&!document.getElementById('gongAutoBattleStop')){
            const stopButton=document.createElement('button');
            stopButton.id='gongAutoBattleStop';
            stopButton.type='button';
            stopButton.className='ctrl gong-auto-stop hidden';
            stopButton.textContent='⏹ 자동 배틀 그만하기';
            stopButton.onclick=stopAutoBattle;
            controls.appendChild(stopButton);
          }

          document.getElementById('back')?.addEventListener('click',()=>{
            if(autoBattleRunning&&!internalBackMove)stopAutoBattle();
          });
          syncAutoButtons();
        }

        function startResultCountdown(initialRemaining=3){
          if(!autoBattleRunning)return;
          const token=++resultRoundToken;
          clearAutoTimers();
          const countdown=ensureAutoCountdown();
          let remaining=Math.max(1,Math.min(3,Math.ceil(Number(initialRemaining)||3)));
          autoCountdownRemaining=remaining;
          countdown.textContent=remaining+'초 후 배틀 재개';
          countdown.classList.remove('hidden');
          syncAutoButtons();
          saveLiveState();

          autoCountdownTimer=setInterval(()=>{
            if(token!==resultRoundToken||!autoBattleRunning)return;
            remaining-=1;
            autoCountdownRemaining=Math.max(0,remaining);
            if(remaining>=1)countdown.textContent=remaining+'초 후 배틀 재개';
            saveLiveState();
          },1000);

          autoAdvanceTimer=setTimeout(()=>{
            if(token!==resultRoundToken||!autoBattleRunning)return;
            clearAutoTimers();
            autoCountdownRemaining=0;
            countdown.classList.add('hidden');
            try{closeResultModal()}catch(error){}
            startNextAutoBattle();
          },remaining*1000);
        }

        function installAutoBattleWatcher(){
          const observer=new MutationObserver(()=>{
            syncAutoButtons();
            if(!autoBattleRunning)return;
            if(!resultModal.classList.contains('hidden')){
              const countdown=document.getElementById('gongAutoCountdown');
              if(!countdown||countdown.classList.contains('hidden'))startResultCountdown();
            }
          });
          observer.observe(resultModal,{attributes:true,attributeFilter:['class'],childList:true,subtree:false});
          setInterval(syncAutoButtons,250);
        }

          function showAdvertisement(index,animate=true){
            currentIndex=(index+advertisements.length)%advertisements.length;

                </div>
                <button class="gong-contact-submit" type="submit">메일 작성창으로 이동</button>
                <div class="gong-contact-note">사이트에서 자동 발송하지 않습니다. 버튼을 누르면 사용자의 메일 앱에서 ddogy503@gmail.com 앞으로 작성된 메일이 열립니다.</div>
              </form>
            </div>\`;
          document.body.appendChild(modal);

          const hints={
            '광고문의':'광고할 상품·서비스, 희망 노출 위치와 기간, 예산 또는 제안 내용을 구체적으로 적어주세요.',
            '스킬문의':'캐릭터 이름, 현재 스킬, 바꾸고 싶은 내용과 수치를 구체적으로 적어주세요.',
            '버그제보':'사용 기기, 발생한 화면, 버그가 생기는 순서, 원래 기대한 결과를 적어주세요.',
            '기타':'위 항목에 포함되지 않는 문의 내용을 자유롭게 적어주세요.'
          };
          const placeholders={
            '광고문의':'예: 광고 대상 / 희망 기간 / 원하는 위치 / 예산 또는 제안 사항',
            '스킬문의':'예: 캐릭터 이름 / 수정할 스킬 / 현재 문제 / 원하는 작동 방식과 수치',
            '버그제보':'예: 기기와 브라우저 / 발생 위치 / 재현 순서 / 실제 결과 / 기대 결과',
            '기타':'문의 내용을 자세히 적어주세요.'
          };

          const category=modal.querySelector('#gongContactCategory');
          const hint=modal.querySelector('#gongContactHint');
          const detail=modal.querySelector('#gongContactDetail');

          function refreshCategoryGuide(){
            hint.textContent=hints[category.value];
            detail.placeholder=placeholders[category.value];
          }
          refreshCategoryGuide();
          category.addEventListener('change',refreshCategoryGuide);

          function openContact(){
            modal.classList.remove('hidden');
            modal.setAttribute('aria-hidden','false');
            category.focus();
          }
          function closeContact(){
            modal.classList.add('hidden');
            modal.setAttribute('aria-hidden','true');
          }

          button.addEventListener('click',openContact);
          modal.querySelector('#gongContactClose').addEventListener('click',closeContact);
          modal.addEventListener('click',event=>{if(event.target===modal)closeContact()});
          document.addEventListener('keydown',event=>{
            if(event.key==='Escape'&&!modal.classList.contains('hidden'))closeContact();
          });

          modal.querySelector('#gongContactForm').addEventListener('submit',event=>{
            event.preventDefault();
            const type=category.value;
            const name=modal.querySelector('#gongContactName').value.trim()||'미입력';
            const reply=modal.querySelector('#gongContactReply').value.trim()||'미입력';
            const subjectText=modal.querySelector('#gongContactSubject').value.trim();
            const detailText=detail.value.trim();
            const subject=\`[공게임 \${type}] \${subjectText}\`;
            const body=[
              \`문의 종류: \${type}\`,
              \`이름/닉네임: \${name}\`,
              \`답변받을 이메일: \${reply}\`,
              '',
              '[상세 내용]',
              detailText,
              '',
              '[자동 첨부 정보]',
              \`작성 시각: \${new Date().toLocaleString('ko-KR')}\`,
              \`페이지: \${location.href}\`,
              \`기기 정보: \${navigator.userAgent}\`
            ].join('\\n');
            const mailto=\`mailto:\${CONTACT_EMAIL}?subject=\${encodeURIComponent(subject)}&body=\${encodeURIComponent(body)}\`;
            const link=document.createElement('a');
            link.href=mailto;
            link.target='_top';
            link.style.display='none';
            document.body.appendChild(link);
            link.click();
            link.remove();
          });
        }

        removeNaeonseongRuntime();
        installAutoBattleUI();
        installPromoBanner();
        installContactUI();
        const restoredLiveState=restoreLiveState();
        installAutoBattleWatcher();
        installLivePersistence();
        if(restoredLiveState&&autoBattleRunning&&game?.over&&!resultModal.classList.contains('hidden')){
          startResultCountdown(autoCountdownRemaining||3);
        }
        document.title='수원외고 공게임 V98';
        console.info('[공게임 V97] IndexedDB 진행 저장·자동 배틀·문의·나언성 삭제·가로형 광고 적용 완료');
      })();`;
      doc.body.appendChild(patch);
      loadFinished=true;
      frame.style.opacity='1';
    }catch(error){
      console.error(error);
      showPatchError(error?.message||String(error));
    }
  });

  loadOnlineGame().catch(error=>{
    console.error(error);
    showPatchError(error?.message||String(error));
  });
  </script>
</body>
</html>
